apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: hotpod-scaling-queue-backlog-burst
spec:
  parallelism: 1
  script:
    configMap:
      name: k6-scaling-queue-backlog-burst
      file: test.js
  runner:
    env:
      - name: HOTPOD_BASE_URL
        value: "http://hotpod.default.svc:80"
      - name: HOTPOD_ADMIN_TOKEN
        valueFrom:
          secretKeyRef:
            name: hotpod-admin-token
            key: token
            optional: true
---
